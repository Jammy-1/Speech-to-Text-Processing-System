name: Pipeline Orchestrator

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch To Deploy ( dev | staging | main )"
        required: true
        type: string

permissions:
  contents: read

jobs:
  # Pre-Deployment
  Pre-Deployment:
    name: Pre-Deployment
    uses: ./.github/workflows/pipeline-pre-deployment.yml
    with:
      branch: ${{ inputs.branch }}

  # Terraform Remote Backend Check
  Terraform-Backend-Checks:
    name: Terraform Backend Checks
    needs: Pre-Deployment
    uses: ./.github/workflows/backend-remote-check.yml
    with:
      branch: ${{ inputs.branch }}
