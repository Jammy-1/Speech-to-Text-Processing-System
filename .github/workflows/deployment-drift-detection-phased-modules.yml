name: Deployment - Drift Detection - Phased Modules

on:
  workflow_call:
    inputs:
      branch:
        required: true
        type: string
    secrets:
      AZURE_CLIENT_ID:
      AZURE_CLIENT_SECRET:
      AZURE_SUBSCRIPTION_ID:
      AZURE_TENANT_ID:
    outputs:
      drift_status:
        value: ${{ jobs.Drift-Detection.outputs.drift_status }}
      drift_exit_code:
        value: ${{ jobs.Drift-Detection.outputs.drift_exit_code }}

      phase1_drift_status:
        value: ${{ jobs.Drift-Detection.outputs.phase1_drift_status }}

      phase2_drift_status:
        value: ${{ jobs.Drift-Detection.outputs.phase2_drift_status }}

      phase3_drift_status:
        value: ${{ jobs.Drift-Detection.outputs.phase3_drift_status }}

      phase1_drift_exit_code:
        value: ${{ jobs.Drift-Detection.outputs.phase1_drift_exit_code }}

      phase2_drift_exit_code:
        value: ${{ jobs.Drift-Detection.outputs.phase2_drift_exit_code }}

      phase3_drift_exit_code:
        value: ${{ jobs.Drift-Detection.outputs.phase3_drift_exit_code }}

  workflow_dispatch:
    inputs:
      branch:
        description: "Branch To Run Workflow - Leave Empty For Current Branch"
        required: false
        type: string

jobs:
  Drift-Detection:
    runs-on: ubuntu-latest
    env:
      TF_LOG: "ERROR"
      INPUT_BRANCH: ${{ inputs.branch }}
      DISPATCH_BRANCH: ${{ github.event.inputs.branch }}

    outputs:
      env_name: ${{ steps.detect-env.outputs.env }}
      drift_status: ${{ steps.drift-result.outputs.drift_status }}
      drift_exit_code: ${{ steps.drift-result.outputs.exit_code }}

      phase1_drift_status: ${{ steps.phase1.outputs.status }}
      phase1_drift_exit_code: ${{ steps.phase1.outputs.exit_code }}

      phase2_drift_status: ${{ steps.phase2.outputs.status }}
      phase2_drift_exit_code: ${{ steps.phase2.outputs.exit_code }}

      phase3_drift_status: ${{ steps.phase3.outputs.status }}
      phase3_drift_exit_code: ${{ steps.phase3.outputs.exit_code }}

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      # Determine Branch & Environment
      - name: Determine Branch & Enviroment
        id: detect-env
        shell: bash
        run: |
          echo "Event: $GITHUB_EVENT_NAME"

           if [ "$GITHUB_EVENT_NAME" = "workflow_call" ]; then
            BRANCH="$INPUT_BRANCH"

           elif [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ] && [ -n "$DISPATCH_BRANCH" ]; then
            BRANCH="$DISPATCH_BRANCH"

          elif [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            BRANCH="$GITHUB_BASE_REF"

          else
            BRANCH="${GITHUB_REF#refs/heads/}"
          fi

          echo "Branch: $BRANCH"

          case "$BRANCH" in
            dev) ENV="dev" ;;
            staging) ENV="staging" ;;
            main) ENV="production" ;;
            *) echo "Invalid Branch: $BRANCH"; exit 1 ;;
            esac

          TFVARS_FILE="environments/${ENV}/${ENV}.tfvars"

          echo "ENV=$ENV" >> $GITHUB_ENV
          echo "TFVARS_FILE=$TFVARS_FILE" >> $GITHUB_ENV
          echo "env=$ENV" >> $GITHUB_OUTPUT

          echo "Environment: $ENV"
          echo "Using TFVARS File: $TFVARS_FILE"

      # Determine Backend Variables
      - name: Determine Backend Variables
        run: |
          BACKEND_FILE="environments/${ENV}/backend.tfvars"

          if [ ! -f "$BACKEND_FILE" ]; then
           echo "Backend TFVARS File Not Found: $BACKEND_FILE"
           exit 1
          fi

           RG=$(grep -E '^state_resource_group_name' "$BACKEND_FILE" | awk -F'=' '{print $2}' | xargs)
           SA=$(grep -E '^state_storage_account_name' "$BACKEND_FILE" | awk -F'=' '{print $2}' | xargs)
           CONTAINER=$(grep -E '^state_storage_container_name' "$BACKEND_FILE" | awk -F'=' '{print $2}' | xargs)
           KEY=$(grep -E '^state_key_deployment' "$BACKEND_FILE" | awk -F'=' '{print $2}' | xargs)

           RG="${RG//$'\r'/}"
           SA="${SA//$'\r'/}"
           CONTAINER="${CONTAINER//$'\r'/}"
           KEY="${KEY//$'\r'/}"

           echo "RG_NAME=$RG" >> $GITHUB_ENV
           echo "STORAGE_ACCOUNT_NAME=$SA" >> $GITHUB_ENV
           echo "STORAGE_CONTAINER_NAME=$CONTAINER" >> $GITHUB_ENV
           echo "STATE_KEY_DEPLOYMENT=$KEY" >> $GITHUB_ENV

        # Terraform Backend Folders & Files
      - name: Terraform Backend Folders & Files
        run: |
          echo "Terraform Backend Folders & Files:"
          for dir in environments/terraform-backend/*; do
            if [ -d "$dir" ]; then
              echo "Folder: $dir"
              ls -1 "$dir"
            fi
          done

      # Backend Variables
      - name: Backend Variables
        run: |
          echo "Resource Group Name       : ${{ env.RG_NAME }}"
          echo "Storage Account Name      : ${{ env.STORAGE_ACCOUNT_NAME }}"
          echo "Storage Container Name    : ${{ env.STORAGE_CONTAINER_NAME }}"
          echo "Terraform Deployment State Key : ${{ env.STATE_KEY_DEPLOYMENT }}"

        # Modules
      - name: List Module Folders
        run: ls -l modules/

        # Clear Cahce
      - name: Clear Cache
        run: |
          echo "Cleaning Cache..."

          rm -rf .terraform .terraform.lock.hcl

          rm -rf environments/${ENV}/.terraform
          rm -f environments/${ENV}/.terraform.lock.hcl

          echo "Cleanup Complete"

        # Terraform Setup
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

        # Terraform Version
      - name: Terraform Version
        working-directory: .
        run: terraform version

        # Initialize Terraform Withs Backend
      - name: Initialize Terraform
        working-directory: .
        run: |
          echo "Initializing Terraform Backend..."
          terraform init \
          -backend-config="resource_group_name=$RG_NAME" \
          -backend-config="storage_account_name=$STORAGE_ACCOUNT_NAME" \
          -backend-config="container_name=$STORAGE_CONTAINER_NAME" \
          -backend-config="key=$STATE_KEY_DEPLOYMENT"
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

      # Drift Detection Phase 1
      - name: Drift Detection Phase 1
        id: phase1
        continue-on-error: true
        run: |
          set -o pipefail

          terraform plan \
            -target=module.resource_group \
            -target=module.network \
            -target=module.log-analytics \
            -var-file="$TFVARS_FILE" \
            -detailed-exitcode \
            -no-color | grep "Plan:"

          exit_code=${PIPESTATUS[0]}

          echo "Phase 1 Exit Code: $exit_code"

          if [ "$exit_code" -eq 0 ]; then
            status="no_drift"
          elif [ "$exit_code" -eq 2 ]; then
            status="drift_detected"
          else
            status="error"
          fi

          echo "Phase 1 Status: $status"
          echo "status=$status" >> $GITHUB_OUTPUT
          echo "exit_code=$exit_code" >> $GITHUB_OUTPUT
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

      # Drift Detection Phase 2
      - name: Drift Detection Phase 2
        id: phase2
        continue-on-error: true
        run: |
          set -o pipefail

          terraform plan \
            -target=module.uai-rbac-fic \
            -target=module.key-vault \
            -target=module.storage \
            -target=module.queue \
            -var-file="$TFVARS_FILE" \
            -detailed-exitcode \
            -no-color | grep "Plan:"

          exit_code=${PIPESTATUS[0]}

          echo "Phase 2 Exit Code: $exit_code"

          if [ "$exit_code" -eq 0 ]; then
            status="no_drift"
          elif [ "$exit_code" -eq 2 ]; then
            status="drift_detected"
          else
            status="error"
          fi

          echo "Phase 2 Status: $status"
          echo "status=$status" >> $GITHUB_OUTPUT
          echo "exit_code=$exit_code" >> $GITHUB_OUTPUT
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

      # Drift Detection Phase 3
      - name: Drift Detection Phase 3
        id: phase3
        continue-on-error: true
        run: |
          set -o pipefail

          terraform plan \
            -target=module.acr \
            -target=module.cognitive \
            -target=module.aks \
            -var-file="$TFVARS_FILE" \
            -detailed-exitcode \
            -no-color | grep "Plan:"

          exit_code=${PIPESTATUS[0]}

          echo "Phase 3 Exit Code: $exit_code"

          if [ "$exit_code" -eq 0 ]; then
            status="no_drift"
          elif [ "$exit_code" -eq 2 ]; then
            status="drift_detected"
          else
            status="error"
          fi

          echo "Phase 3 Status: $status"
          echo "status=$status" >> $GITHUB_OUTPUT

          echo "Phase 3 Exit Code: $exit_code"
          echo "exit_code=$exit_code" >> $GITHUB_OUTPUT
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

        # Evaluate Drift Result
      - name: Evaluate Drift Result
        id: drift-result
        run: |

          p1="${{ steps.phase1.outputs.exit_code }}"
          p2="${{ steps.phase2.outputs.exit_code }}"
          p3="${{ steps.phase3.outputs.exit_code }}"

          echo ""
          echo "Drift Summary"
          echo "-------------"
          echo "Phase1 exit: $p1"
          echo "Phase2 exit: $p2"
          echo "Phase3 exit: $p3"

          if [ "$p1" = "2" ] || [ "$p2" = "2" ] || [ "$p3" = "2" ]; then
                echo "Result: DRIFT DETECTED"
                echo "drift_status=drift_detected" >> $GITHUB_OUTPUT
                echo "exit_code=2" >> $GITHUB_OUTPUT

              elif [ "$p1" = "1" ] || [ "$p2" = "1" ] || [ "$p3" = "1" ]; then
                echo "Result : ERROR"
                echo "drift_status=error" >> $GITHUB_OUTPUT
                echo "exit_code=1" >> $GITHUB_OUTPUT
                exit 1

              else
                echo "Result : NO DRIFT"
                echo "drift_status=no_drift" >> $GITHUB_OUTPUT
                echo "exit_code=0" >> $GITHUB_OUTPUT
              fi
